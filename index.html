<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Revolution Records</title>
    <style>
        :root { --bg: #0f0a12; --accent: #8e44ad; --text: #ffffff; --grey: #555; }
        body { background: var(--bg); color: var(--text); font-family: 'Helvetica', sans-serif; margin: 0; }
        a { text-decoration: none; color: white; }

        /* Header */
        header { display: flex; align-items: center; padding: 20px 40px; border-bottom: 1px solid #222; }
        .logo { background: var(--accent); padding: 10px 15px; font-weight: bold; }
        nav { display: flex; gap: 30px; margin-left: 40px; font-size: 12px; }
        .nav-right { margin-left: auto; display: flex; align-items: center; gap: 20px; }
        .submit-btn { background: var(--accent); padding: 10px 20px; border: none; color: white; cursor: pointer; }

        /* Sidebar */
        .sidebar { position: fixed; left: 20px; top: 40%; writing-mode: vertical-rl; transform: rotate(180deg); color: var(--grey); font-size: 10px; }

        /* Hero */
        .hero { height: 80vh; background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url('hero-bg.jpg') center/cover; display: flex; flex-direction: column; justify-content: center; padding-left: 100px; }
        .hero h1 { font-size: 60px; margin: 0; }

        /* Grids */
        section { padding: 40px 100px; }
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; }
        @media (max-width: 768px) { .grid { grid-template-columns: repeat(2, 1fr); } }
        
        .card { background: #1a1a1a; }
        .card img { width: 100%; aspect-ratio: 1; object-fit: cover; display: block; }
        .card-info { padding: 15px; }

        /* Footer */
        footer { padding: 60px 100px; border-top: 1px solid #222; text-align: center; }
        .footer-bottom { margin-top: 40px; color: var(--grey); font-size: 12px; }
    </style>
</head>
<body>

    <header>
        <div class="logo">RR</div>
        <nav>
            <a href="/artists">ARTISTS</a>
            <a href="/releases">RELEASES</a>
            <a href="/videos">VIDEOS</a>
            <a href="/about">ABOUT</a>
        </nav>
        <div class="nav-right">
            <!-- SVG Social Icons -->
            <a href="#"><svg width="20" height="20" fill="white" viewBox="0 0 24 24"><path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"/></svg></a>
            <a href="#"><svg width="20" height="20" fill="white" viewBox="0 0 24 24"><path d="M23 3a10.9 10.9 0 0 1-3.14 1.53 4.48 4.48 0 0 0-7.86 3v1A10.66 10.66 0 0 1 3 4s-4 9 5 13a11.64 11.64 0 0 1-7 2c9 5 20 0 20-11.5a4.5 4.5 0 0 0-.08-.83A7.72 7.72 0 0 0 23 3z"/></svg></a>
            <button class="submit-btn" onclick="window.location.href='/demo'">SUBMIT DEMO</button>
        </div>
    </header>

    <div class="sidebar">++ DEVELOPING TALENTS SINCE 2023</div>

    <section class="hero">
        <h1>HENDIRCK LAMAR</h1>
        <p>STREAM NOW ON ALL PLATFORMS</p>
    </section>

    <section>
        <h2>ARTISTS <a href="/artists" style="color: var(--accent); font-size: 14px;">VIEW ALL →</a></h2>
        <div class="grid">
            <div class="card"><img src="chuma.webp" alt="Artist"><div class="card-info"><a href="/artists/ycmb-chuma">Ycmb Chuma ↗</a></div></div>
            <div class="card"><img src="kion.webp" alt="Artist"><div class="card-info"><a href="/artists/kion">Kion ↗</a></div></div>
        </div>
    </section>

    <section>
        <h2>RELEASES <a href="/releases" style="color: var(--accent); font-size: 14px;">VIEW ALL →</a></h2>
        <div class="grid">
            <div class="card"><img src="ya-habibty.webp" alt="Cover"><div class="card-info">Ya Habibty<br><small style="color:var(--grey)">by Kion</small></div></div>
        </div>
    </section>

    <section>
        <h2>VIDEOS <a href="/videos" style="color: var(--accent); font-size: 14px;">VIEW ALL →</a></h2>
        <div class="grid">
            <!-- 8 Video placeholders -->
            <div class="card"><img src="video-thumb.webp" alt="Video"></div>
        </div>
    </section>

    <footer>
        <div class="footer-bottom">2026 © REVOLUTION RECORDS</div>
    </footer>

</body>
</html>
